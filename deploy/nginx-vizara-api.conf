# Vizara API — api.vizara.uz
upstream vizara_api {
    server 127.0.0.1:3011;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.vizara.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.vizara.uz;

    ssl_certificate     /etc/letsencrypt/live/api.vizara.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vizara.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 4096M;

    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass http://vizara_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }
}

# Legacy saxar.uz domains → vizara.uz (keep old QR links working)
server {
    listen 80;
    listen [::]:80;
    server_name vizara.saxar.uz;

    return 301 https://vizara.uz$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name vizaraapi.saxar.uz;

    return 301 https://api.vizara.uz$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vizara.saxar.uz;

    ssl_certificate     /etc/letsencrypt/live/vizara.saxar.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vizara.saxar.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://vizara.uz$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vizaraapi.saxar.uz;

    ssl_certificate     /etc/letsencrypt/live/vizaraapi.saxar.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vizaraapi.saxar.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://api.vizara.uz$request_uri;
}

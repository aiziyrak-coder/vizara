# Vizara — production reverse proxy (nginx)
# TLS sertifikatlari: certbot yoki cloudflare

upstream vizara_app {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name vizara.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vizara.example.com;

    # ssl_certificate /etc/letsencrypt/live/vizara.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/vizara.example.com/privkey.pem;

    client_max_body_size 4096M;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://vizara_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /api/billing/webhook {
        proxy_pass http://vizara_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Stripe-Signature $http_stripe_signature;
        client_max_body_size 1m;
    }
}

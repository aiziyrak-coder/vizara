# Vizara frontend — vizara.uz
server {
    listen 80;
    listen [::]:80;
    server_name vizara.uz www.vizara.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://vizara.uz$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.vizara.uz;

    ssl_certificate     /etc/letsencrypt/live/vizara.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vizara.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://vizara.uz$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vizara.uz;

    ssl_certificate     /etc/letsencrypt/live/vizara.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vizara.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/vizara/dist;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
